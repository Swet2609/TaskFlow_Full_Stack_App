version: "3.8"

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: taskflow_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: taskflow
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: taskflow_backend
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb:27017/taskflow
      JWT_SECRET: dev_secret_key_change_in_production
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - ./server/src:/app/src
    networks:
      - taskflow-network

  # Frontend React App
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: taskflow_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5000
    volumes:
      - ./client/src:/app/src
    networks:
      - taskflow-network

volumes:
  mongodb_data:

networks:
  taskflow-network:
    driver: bridge
